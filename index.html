// ---------- session persistence (survives page refresh) ----------
function saveSession(session){

// ---------- storage helpers (Firestore) ----------
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout:' + label)), ms))
  ]);
}
async function loadEmployees(){
  try{
    const snap = await withTimeout(getDoc(doc(db, 'meta', 'employees')), 12000, 'loadEmployees');
    return snap.exists() ? (snap.data().list || []) : [];
  }catch(e){ console.error('loadEmployees error', e); return []; }
}
async function saveEmployees(list){
  try{
    await withTimeout(setDoc(doc(db, 'meta', 'employees'), { list }), 12000, 'saveEmployees');
    return true;
  }catch(e){ console.error('saveEmployees error', e); return (e && e.message) || 'שגיאה לא ידועה'; }
}
async function loadHours(empId){
  try{
    const snap = await withTimeout(getDoc(doc(db, 'hours', empId)), 12000, 'loadHours');
    return snap.exists() ? snap.data() : {};
  }catch(e){ console.error('loadHours error', e); return {}; }
}
async function saveHours(empId, data){

function calcPay(emp, hoursTotal){
  if(emp.payType === 'fixed'){ return emp.rate; }
  return hoursTotal * emp.rate;
}
function computeHoursFromRange(start, end){
  if(!start || !end) return null;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let startMin = sh*60 + sm;
  let endMin = eh*60 + em;
  if(endMin <= startMin) endMin += 24*60; // crosses midnight
  const diffHours = (endMin - startMin) / 60;
  return Math.round(diffHours * 100) / 100;
}
function nowTimeStr(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
// Net worked hours for an entry, subtracting any completed breaks. Returns null if the entry is still open (no end time yet).
function computeEntryHours(entry){
  if(!entry.end) return null;
  const gross = computeHoursFromRange(entry.start, entry.end);
  if(gross === null) return null;
  const breaksHours = (entry.breaks || []).reduce((s,b) => {
    if(!b.end) return s;
    const h = computeHoursFromRange(b.start, b.end);
    return s + (h || 0);
  }, 0);
  return Math.max(0, Math.round((gross - breaksHours) * 100) / 100);
}
function findOpenEntryToday(entries){
  const t = todayStr();
  return entries.find(e => e.date === t && !e.end) || null;
}

// ---------- Excel import helpers ----------
function parseCellDate(value){
  if(value === null || value === undefined || value === '') return null;
  if(value instanceof Date){
    return value.getFullYear() + '-' + String(value.getMonth()+1).padStart(2,'0') + '-' + String(value.getDate()).padStart(2,'0');
  }
  if(typeof value === 'number'){
    try{
      const info = XLSX.SSF.parse_date_code(value);
      if(!info) return null;
      return info.y + '-' + String(info.m).padStart(2,'0') + '-' + String(info.d).padStart(2,'0');
    }catch(e){ return null; }
  }
  if(typeof value === 'string'){
    const s = value.trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) return m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
    return null;
  }
  return null;
}
function parseCellTime(value){
  if(value === null || value === undefined || value === '') return null;
  if(value instanceof Date){
    return String(value.getHours()).padStart(2,'0') + ':' + String(value.getMinutes()).padStart(2,'0');
  }
  if(typeof value === 'number'){
    const totalMinutes = Math.round(value * 24 * 60);
    const h = Math.floor(totalMinutes / 60) % 24;
    const m = totalMinutes % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  if(typeof value === 'string'){
    const s = value.trim();
    const m = s.match(/^(\d{1,2}):(\d{2})/);
    if(m) return m[1].padStart(2,'0') + ':' + m[2];
    return null;
  }
  return null;
}
async function parseExcelFile(file){
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
  if(!rows || rows.length === 0) return { rows: [], error: 'הקובץ ריק' };

  let startRow = 0, dateCol = 0, startCol = 1, endCol = 2;
  const looksLikeData = parseCellDate(rows[0][0]) !== null;
  if(!looksLikeData){
    const header = rows[0].map(h => (h === null || h === undefined) ? '' : h.toString().trim().toLowerCase());
    const findCol = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
    const dc = findCol(['תאריך','date']);
    const sc = findCol(['משעה','התחלה','start']);
    const ec = findCol(['עד','סיום','end']);
    if(dc >= 0) dateCol = dc;
    if(sc >= 0) startCol = sc;
    if(ec >= 0) endCol = ec;
    startRow = 1;
  }

  const results = [];
  for(let i = startRow; i < rows.length; i++){
    const row = rows[i];
    if(!row || row.every(c => c === null || c === '')) continue;
    const date = parseCellDate(row[dateCol]);
    const start = parseCellTime(row[startCol]);
    const end = parseCellTime(row[endCol]);
    let error = null;
    let hours = null;
    if(!date) error = 'תאריך לא תקין';
    else if(!start || !end) error = 'שעה לא תקינה';
    else {
      hours = computeHoursFromRange(start, end);
      if(hours === null || hours <= 0) error = 'טווח שעות לא תקין';
    }
    results.push({ rowNum: i + 1, date, start, end, hours, error });
  }
  return { rows: results, error: null };
}

// ---------- init ----------
let authReady = false;
let liveTimerInterval = null;
function stopLiveTimer(){
  if(liveTimerInterval){ clearInterval(liveTimerInterval); liveTimerInterval = null; }
}
function startLiveTimer(sinceTimeStr){
  stopLiveTimer();
  const el = document.getElementById('liveTimer');
  if(!el) return;
  function update(){
    const target = document.getElementById('liveTimer');
    if(!target){ stopLiveTimer(); return; }
    const now = new Date();
    const [h, m] = sinceTimeStr.split(':').map(Number);
    const since = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    let diffMs = now - since;
    if(diffMs < 0) diffMs += 24 * 60 * 60 * 1000; // crossed midnight
    const totalSec = Math.floor(diffMs / 1000);
    const hh = Math.floor(totalSec / 3600);
    const mm = Math.floor((totalSec % 3600) / 60);
    const ss = totalSec % 60;
    target.textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
  }
  update();
  liveTimerInterval = setInterval(update, 1000);
}
async function init(){
  app.innerHTML = '<div class="empty-state">טוען...</div>';
  state.employees = await loadEmployees();
  state.loading = false;

  onAuthStateChanged(auth, (user) => {
    if(authReady) return; // only handle the initial resolution; explicit sign-in/out render themselves
    authReady = true;
    if(user){
      state.isAdmin = true;
      state.adminEmail = user.email;
      renderAdminDashboard('summary');
      return;
    }
    const session = loadSession();
    if(session && session.role === 'employee'){
      const emp = state.employees.find(x => x.id === session.empId);
      if(emp){ renderEmployeeDashboard(emp); return; }
      clearSession();
    }
    renderLanding();
  });
}

function setHeader(subtitle, actionsHtml){

  headerActions.innerHTML = actionsHtml || '';

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Custom confirm modal (replaces native confirm() so we can style/animate the message)
function showConfirmModal(message){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <p class="confirm-msg">${escapeHtml(message)}</p>
        <div class="actions">
          <button type="button" class="btn danger" id="confirmYes" style="padding:10px 22px;">מחיקה</button>
          <button type="button" class="btn ghost" id="confirmNo">ביטול</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const cleanup = (result) => { overlay.remove(); resolve(result); };
    overlay.querySelector('#confirmYes').onclick = () => cleanup(true);
    overlay.querySelector('#confirmNo').onclick = () => cleanup(false);
    overlay.onclick = (e) => { if(e.target === overlay) cleanup(false); };
  });
}

function avatarHtml(emp, size){
  const sizeClass = size === 'small' ? ' small' : '';
  if(emp.photo){
    return `<img class="avatar${sizeClass}" src="${emp.photo}" alt="${escapeHtml(emp.name)}" />`;
  }
  const initial = (emp.name || '?').trim().charAt(0).toUpperCase();
  return `<div class="avatar-placeholder${sizeClass}">${escapeHtml(initial)}</div>`;
}

function resizeImageFile(file, maxSize, quality){
  maxSize = maxSize || 160;
  quality = quality || 0.7;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const scale = Math.min(1, maxSize / Math.max(w, h));
        w = Math.max(1, Math.round(w * scale));
        h = Math.max(1, Math.round(h * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('לא ניתן לקרוא את קובץ התמונה'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('לא ניתן לקרוא את קובץ התמונה'));
    reader.readAsDataURL(file);
  });
}

    if(state.employees.some(x => x.username === username && x.id !== emp.id)){
      errEl.textContent = 'שם המשתמש כבר קיים';
      return;
    }
    const submitBtn = e.target.querySelector('button[type="submit"]');
    errEl.style.color = '';
    errEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'שומר...';
    const photoFile = document.getElementById('editPhoto').files[0];
    let photo = emp.photo || null;
    if(removePhotoFlag) photo = null;
    if(photoFile){
      try{ photo = await resizeImageFile(photoFile); }
      catch(err){ errEl.textContent = 'שגיאה בקריאת התמונה'; submitBtn.disabled=false; submitBtn.textContent='שמירת שינויים'; return; }
    }
    const updatedEmp = {
      ...emp,
      name: document.getElementById('editName').value.trim(),
      username,
      pin: document.getElementById('editPin').value.trim(),
      phone: document.getElementById('editPhone').value.trim(),
      email: document.getElementById('editEmail').value.trim(),
      address: document.getElementById('editAddress').value.trim(),
      photo,
      payType: document.getElementById('editPayType').value,
      rate: Number(document.getElementById('editRate').value),
    };
    const updatedList = state.employees.map(x => x.id === emp.id ? updatedEmp : x);
    const ok = await saveEmployees(updatedList);
    submitBtn.disabled = false;
    submitBtn.textContent = 'שמירת שינויים';
    if(ok !== true){ errEl.textContent = 'שגיאה בשמירה: ' + ok; return; }
    state.employees = updatedList;
    renderAdminDashboard('employees');
  };
}

        <b>${escapeHtml(state.adminEmail || '')}</b> עם קישור לקביעת סיסמה חדשה. אין צורך בהגדרה נוספת.

    </div>
    <div class="card">
      <h3>הודעה לעובדים</h3>

        תמונה וכיתוב שיוצגו לכל עובד בראש הדף שלו כשהוא נכנס למערכת. אפשר למלא רק תמונה, רק כיתוב, או את שניהם.
      </p>
      ${announcement.image ? `<img src="${announcement.image}" style="max-width:100%; max-height:220px; border-radius:6px; margin-bottom:12px; display:block;" />` : ''}
      <form id="announcementForm">

        ${announcement.image ? '<div class="actions" style="justify-content:flex-start; margin-top:8px;"><button type="button" class="btn danger" id="removeAnnouncementImg">הסרת תמונה</button></div>' : ''}
        <div class="field" style="margin-top:14px;"><label>כיתוב</label><textarea id="announcementCaption" rows="3" style="width:100%; font-family:'Heebo',sans-serif; font-size:15px; padding:10px 12px; border:1.5px solid var(--line); border-radius:4px; background:var(--paper); color:var(--ink);">${escapeHtml(announcement.caption || '')}</textarea></div>
        <div class="error-msg" id="announcementErr"></div>
        <div class="actions" style="justify-content:flex-start;">
          <button type="submit" class="btn brass">שמירת הודעה</button>
        </div>
      </form>
    </div>
    <div class="card">
      <h3>הערת אבטחה</h3>
      <p class="hint" style="font-size:13.5px;">
        פרטי העובדים והשעות שמורים במסד נתונים אמיתי (Firebase Firestore), הפועל כרגע ב"מצב בדיקה" (test mode) –
        כלומר אין הגבלת הרשאות אמיתית מצד השרת מעבר להתחברות עצמה. כניסת המנהל מוגנת כעת באמצעות
        Firebase Authentication אמיתי (אימייל+סיסמה), אך כניסת העובדים עדיין מבוססת קוד PIN בממשק בלבד.
        חשוב לדעת: מצב הבדיקה של Firestore פג אוטומטית אחרי כ-30 יום, ואז הכתיבה לנתונים תיפסק עד שיוגדרו
        כללי אבטחה (Security Rules) קבועים. מומלץ לשתף את קובץ האתר רק עם אנשי הצוות ולא לפרסם אותו publicly.
      </p>
    </div>
  `;
  let removeAnnouncementFlag = false;
  const removeAnnouncementBtn = document.getElementById('removeAnnouncementImg');
  if(removeAnnouncementBtn){
    removeAnnouncementBtn.onclick = () => {
      removeAnnouncementFlag = true;
      removeAnnouncementBtn.textContent = 'התמונה תוסר בשמירה ✓';
      removeAnnouncementBtn.disabled = true;
    };
  }
  document.getElementById('announcementForm').onsubmit = async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('announcementErr');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const caption = document.getElementById('announcementCaption').value.trim();
    const imageFile = document.getElementById('announcementImage').files[0];
    errEl.style.color = '';
    errEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'שומר...';
    let image = announcement.image || null;
    if(removeAnnouncementFlag) image = null;
    if(imageFile){
      try{ image = await resizeImageFile(imageFile, 640, 0.75); }
      catch(err){ errEl.textContent = 'שגיאה בקריאת התמונה'; submitBtn.disabled=false; submitBtn.textContent='שמירת הודעה'; return; }
    }
    const ok = await saveAnnouncement(image, caption);
    submitBtn.disabled = false;
    submitBtn.textContent = 'שמירת הודעה';
    if(ok !== true){ errEl.textContent = 'שגיאה בשמירה: ' + ok; return; }
    errEl.style.color = '#2F5233';
    errEl.textContent = 'ההודעה נשמרה בהצלחה';
    renderAdminSettings();
  };
  document.getElementById('changePassForm').onsubmit = async (e) => {
    e.preventDefault();
    const cur = document.getElementById('curPass').value;
    const np = document.getElementById('newPass').value;
    const errEl = document.getElementById('passErr');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    errEl.style.color = '';
    errEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'שומר...';
    try{
      const user = auth.currentUser;
      const credential = EmailAuthProvider.credential(user.email, cur);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, np);
      errEl.style.color = '#2F5233';
      errEl.textContent = 'הסיסמה עודכנה בהצלחה';
      e.target.reset();
    }catch(err){
      console.error('change password error', err);
      const code = err && err.code;
      if(code === 'auth/invalid-credential' || code === 'auth/wrong-password'){
        errEl.textContent = 'הסיסמה הנוכחית שגויה';
      }else{
        errEl.textContent = 'שגיאה: ' + (code || (err && err.message) || 'לא ידועה');
      }
    }
    submitBtn.disabled = false;
    submitBtn.textContent = 'עדכון סיסמה';
  };
}

// ---------- EMPLOYEE DASHBOARD ----------
async function renderEmployeeDashboard(emp, editingId, useCache){
  stopLiveTimer();
  state.currentEmployee = emp;
  setHeader('שלום, ' + emp.name, '<button class="btn ghost small" id="logoutBtn">יציאה</button>');
  const month = state._empMonth || currentMonthStr();

  const cacheValid = useCache && state._dashCache && state._dashCache.empId === emp.id;
  let hoursData, cachedAnnouncement;
  if(cacheValid){
    hoursData = state._dashCache.hoursData;
    cachedAnnouncement = state._dashCache.announcement;
  }else{
    app.innerHTML = `<div class="empty-state">טוען נתונים...</div>`;
    hoursData = await loadHours(emp.id);
  }
  const entries = (hoursData[month] || []).slice().sort((a,b) => a.date.localeCompare(b.date));
  const totalHours = entries.reduce((s,e) => s + (computeEntryHours(e) || 0), 0);
  const pay = calcPay(emp, totalHours);
  const editingEntry = editingId ? entries.find(e => e.id === editingId) : null;
  let announcement;
  if(editingEntry){
    announcement = { image: null, caption: '' };
  }else if(cacheValid){
    announcement = cachedAnnouncement;
  }else{
    announcement = await loadAnnouncement();
  }
  state._dashCache = { empId: emp.id, hoursData, announcement: editingEntry ? cachedAnnouncement : announcement };

  const todayMonth = currentMonthStr();
  const todayEntries = hoursData[todayMonth] || [];
  const openEntry = findOpenEntryToday(todayEntries);
  const onBreak = !!(openEntry && openEntry.breaks && openEntry.breaks.length && !openEntry.breaks[openEntry.breaks.length - 1].end);
  const lastBreak = onBreak ? openEntry.breaks[openEntry.breaks.length - 1] : null;

  app.innerHTML = `
    ${editingEntry ? '' : `
    <div class="avatar-row" style="margin-bottom:16px;">
      ${avatarHtml(emp)}
      <div class="name" style="font-size:18px;">${escapeHtml(emp.name)}</div>
    </div>
    ${(announcement.image || announcement.caption) ? `
    <div class="card" style="border-color:var(--brass);">
      ${announcement.image ? `<img src="${announcement.image}" style="max-width:100%; border-radius:6px; margin-bottom:${announcement.caption ? '12px' : '0'}; display:block;" />` : ''}
      ${announcement.caption ? `<p style="margin:0; font-size:15px; white-space:pre-wrap;">${escapeHtml(announcement.caption)}</p>` : ''}
    </div>
    ` : ''}
    <div class="top-actions">
      <input type="month" class="month-picker" id="empMonthPicker" value="${month}" />
      <span class="subtitle">${monthLabel(month)} · ${emp.payType === 'hourly' ? 'שכר שעתי · ' + fmtMoney(emp.rate) + ' לשעה' : 'שכר חודשי קבוע'}</span>
    </div>
    <div class="readout">
      <div class="digit-block"><div class="num mono">${fmtHours(totalHours)}</div><div class="lbl">סה"כ שעות החודש</div></div>
      <div class="digit-block"><div class="num mono">${fmtMoney(pay)}</div><div class="lbl">סה"כ לתשלום</div></div>
    </div>

    <div class="card">
      <h3>כרטיס נוכחות היום</h3>
      ${!openEntry ? `
        <p class="hint" style="margin-top:-6px; margin-bottom:16px; font-size:13px;">לחצו כשאתם מגיעים לעבודה — את שעת הסיום תעדכנו בנפרד בסוף היום.</p>
        <form id="clockInForm">
          <div class="emp-row-form">
            <div class="field"><label>שעת הגעה</label><input type="time" id="clockInTime" value="${nowTimeStr()}" required /></div>
          </div>
          <div class="error-msg" id="clockInErr"></div>
          <div class="actions" style="justify-content:flex-start;">
            <button type="submit" class="btn brass">🟢 התחלת יום עבודה</button>
          </div>
        </form>
      ` : `
        <p class="hint" style="margin-top:-6px; font-size:14px;">
          ${onBreak ? `⏸️ בהפסקה מאז <b class="mono">${lastBreak.start}</b>` : `🟢 בעבודה מאז <b class="mono">${openEntry.start}</b>`}
        </p>
        <div class="timer-row">
          <span class="hourglass-spin">⏳</span>
          <div>
            <div id="liveTimer" class="mono" style="font-size:32px; color:var(--brass-dark);">00:00:00</div>
            <div style="color:var(--muted); font-size:12px;">${onBreak ? 'זמן הפסקה רץ' : 'זמן עבודה רץ'}</div>
          </div>
        </div>
        ${(openEntry.breaks && openEntry.breaks.length) ? `
          <div class="table-scroll" style="margin:12px 0;">
            <table>
              <thead><tr><th>הפסקה</th><th>משך</th></tr></thead>
              <tbody>
                ${openEntry.breaks.map(b => `<tr><td class="mono">${b.start} – ${b.end || 'מתמשכת'}</td><td class="mono">${b.end ? fmtHours(computeHoursFromRange(b.start,b.end)) + ' שעות' : '—'}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        ` : ''}
        <div class="actions" style="justify-content:flex-start; margin-top:10px;">
          ${onBreak
            ? '<button type="button" class="btn brass" id="endBreakBtn">▶️ סיום הפסקה</button>'
            : '<button type="button" class="btn ghost" id="startBreakBtn">☕ התחלת הפסקה</button>'
          }
        </div>
        ${!onBreak ? `
          <form id="clockOutForm" style="margin-top:18px; border-top:1px solid var(--line); padding-top:16px;">
            <div class="emp-row-form">
              <div class="field"><label>שעת סיום</label><input type="time" id="clockOutTime" value="${nowTimeStr()}" required /></div>
            </div>
            <div class="error-msg" id="clockOutErr"></div>
            <div class="actions" style="justify-content:flex-start;">
              <button type="submit" class="btn brass">🔴 סיום יום עבודה</button>
            </div>
          </form>
        ` : ''}
      `}
    </div>

    <div class="card">
      <div class="collapsible-header" id="excelToggleHeader">
        <h3 style="margin:0;">ייבוא שעות מקובץ אקסל</h3>
        <span class="chevron">${state._excelOpen ? '▲' : '▼'}</span>
      </div>
      ${state._excelOpen ? `
      <div style="margin-top:14px;">
        <p class="hint" style="margin-top:0; margin-bottom:14px; font-size:13px;">
          העלו קובץ אקסל (.xlsx) עם שלוש עמודות: <b>תאריך</b>, <b>משעה</b>, <b>עד שעה</b> (מומלץ עם שורת כותרות ראשונה).
          המערכת תקרא את הקובץ ותוסיף את כל השעות בבת אחת, במקום מילוי ידני שורה-שורה.
        </p>
        <input type="file" id="excelFileInput" accept=".xlsx,.xls" />
        <div class="error-msg" id="excelErr"></div>
        <div id="excelPreviewArea"></div>
      </div>
      ` : ''}
    </div>
    `}

    <div class="card">
      <div class="collapsible-header" id="manualToggleHeader" style="${editingEntry ? 'cursor:default;' : ''}">
        <h3 style="margin:0;">${editingEntry ? 'עריכת רישום שעות' : 'הוספה ידנית / תיקון רישום'}</h3>
        ${editingEntry ? '' : `<span class="chevron">${state._manualOpen ? '▲' : '▼'}</span>`}
      </div>
      ${(editingEntry || state._manualOpen) ? `
      <div style="margin-top:14px;">
        <p class="hint" style="margin-top:0; margin-bottom:16px; font-size:13px;">לתיקון רישום ישן או הוספת יום שלם בבת אחת — הזינו תאריך, שעת התחלה ושעת סיום.</p>
        <form id="addHoursForm">
          <div class="emp-row-form">
            <div class="field"><label>תאריך</label><input type="date" id="hoursDate" value="${editingEntry ? editingEntry.date : todayStr()}" required /></div>
          </div>
          <div class="emp-row-form" style="margin-top:14px;">
            <div class="field"><label>משעה</label><input type="time" id="hoursStart" value="${editingEntry ? editingEntry.start || '' : ''}" required /></div>
            <div class="field"><label>עד שעה</label><input type="time" id="hoursEnd" value="${editingEntry ? editingEntry.end || '' : ''}" required /></div>
          </div>
          <div class="mono" id="computedHoursPreview" style="margin-top:12px; font-size:15px; color:var(--brass-dark);"></div>
          <div class="error-msg" id="addHoursErr"></div>
          <div class="actions" style="justify-content:flex-start;">
            <button type="submit" class="btn brass">${editingEntry ? 'עדכון שינויים' : 'הוספה'}</button>
            ${editingEntry ? '<button type="button" class="btn ghost" id="cancelEditHours">ביטול</button>' : ''}
          </div>
        </form>
      </div>
      ` : ''}
    </div>
    ${editingEntry ? '' : `
    <div class="card">
      <h3>רישומי החודש</h3>
      <div id="entriesList">
        ${entries.length === 0 ? '<div class="empty-state">אין עדיין רישומי שעות לחודש זה.</div>' : `
        <div class="table-scroll">
          <table>
            <thead><tr><th>תאריך</th><th>טווח שעות</th><th>הפסקות</th><th>סה"כ שעות</th><th></th></tr></thead>
            <tbody>
              ${entries.map(e => {
                const h = computeEntryHours(e);
                const breaksCount = (e.breaks || []).filter(b => b.end).length;
                return `
                <tr>
                  <td>${e.date}</td>
                  <td class="mono">${e.start ? (e.start + ' – ' + (e.end || '...')) : '—'}</td>
                  <td class="mono">${breaksCount > 0 ? breaksCount + ' הפסקות' : '—'}</td>
                  <td class="mono">${h !== null ? fmtHours(h) : '<span class="pill hourly">בעבודה</span>'}</td>
                  <td>
                    <div class="row-actions">
                      <button class="btn ghost small" data-edit-entry="${e.id}">עריכה</button>
                      <button class="btn danger" data-del-entry="${e.id}">מחיקה</button>
                    </div>
                  </td>
                </tr>
              `;}).join('')}
            </tbody>
          </table>
        </div>
        `}
      </div>
    </div>
    `}
  `;

  document.getElementById('logoutBtn').onclick = () => { stopLiveTimer(); state.currentEmployee = null; clearSession(); renderLanding(); };
  const empMonthPicker = document.getElementById('empMonthPicker');
  if(empMonthPicker){
    empMonthPicker.onchange = (e) => {
      state._empMonth = e.target.value;
      renderEmployeeDashboard(emp);
    };
  }

  if(!editingEntry && openEntry){
    startLiveTimer(onBreak ? lastBreak.start : openEntry.start);
  }

  // ---- clock-in ----
  const clockInForm = document.getElementById('clockInForm');
  if(clockInForm){
    clockInForm.onsubmit = async (e) => {
      e.preventDefault();
      const startTime = document.getElementById('clockInTime').value;
      const errEl = document.getElementById('clockInErr');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      if(!startTime){ errEl.textContent = 'יש להזין שעת הגעה'; return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'שומר...';
      const fresh = await loadHours(emp.id);
      const tm = currentMonthStr();
      if(!fresh[tm]) fresh[tm] = [];
      if(findOpenEntryToday(fresh[tm])){ errEl.textContent = 'כבר קיים יום עבודה פתוח להיום'; submitBtn.disabled=false; submitBtn.textContent='🟢 התחלת יום עבודה'; return; }
      fresh[tm].push({ id: uid(), date: todayStr(), start: startTime, end: null, breaks: [] });
      const ok = await saveHours(emp.id, fresh);
      if(ok !== true){ errEl.textContent = 'שגיאה בשמירה: ' + ok; submitBtn.disabled=false; submitBtn.textContent='🟢 התחלת יום עבודה'; return; }
      if(month !== tm) state._empMonth = tm;
      renderEmployeeDashboard(emp);
    };
  }

  // ---- start break ----
  const startBreakBtn = document.getElementById('startBreakBtn');
  if(startBreakBtn){
    startBreakBtn.onclick = async () => {
      startBreakBtn.disabled = true;
      startBreakBtn.textContent = 'שומר...';
      const fresh = await loadHours(emp.id);
      const tm = currentMonthStr();
      const list = fresh[tm] || [];
      const entry = list.find(x => x.id === openEntry.id);
      if(entry){
        if(!entry.breaks) entry.breaks = [];
        entry.breaks.push({ id: uid(), start: nowTimeStr(), end: null });
      }
      const ok = await saveHours(emp.id, fresh);
      if(ok !== true){ alert('שגיאה בשמירה: ' + ok); startBreakBtn.disabled=false; startBreakBtn.textContent='☕ התחלת הפסקה'; return; }
      renderEmployeeDashboard(emp);
    };
  }

  // ---- end break ----
  const endBreakBtn = document.getElementById('endBreakBtn');
  if(endBreakBtn){
    endBreakBtn.onclick = async () => {
      endBreakBtn.disabled = true;
      endBreakBtn.textContent = 'שומר...';
      const fresh = await loadHours(emp.id);
      const tm = currentMonthStr();
      const list = fresh[tm] || [];
      const entry = list.find(x => x.id === openEntry.id);
      if(entry && entry.breaks && entry.breaks.length){
        entry.breaks[entry.breaks.length - 1].end = nowTimeStr();
      }
      const ok = await saveHours(emp.id, fresh);
      if(ok !== true){ alert('שגיאה בשמירה: ' + ok); endBreakBtn.disabled=false; endBreakBtn.textContent='▶️ סיום הפסקה'; return; }
      renderEmployeeDashboard(emp);
    };
  }

  // ---- clock-out ----
  const clockOutForm = document.getElementById('clockOutForm');
  if(clockOutForm){
    clockOutForm.onsubmit = async (e) => {
      e.preventDefault();
      const endTime = document.getElementById('clockOutTime').value;
      const errEl = document.getElementById('clockOutErr');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      if(!endTime){ errEl.textContent = 'יש להזין שעת סיום'; return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'שומר...';
      const fresh = await loadHours(emp.id);
      const tm = currentMonthStr();
      const list = fresh[tm] || [];
      const entry = list.find(x => x.id === openEntry.id);
      if(!entry){ errEl.textContent = 'הרישום לא נמצא, נסו לרענן'; submitBtn.disabled=false; submitBtn.textContent='🔴 סיום יום עבודה'; return; }
      const h = computeHoursFromRange(entry.start, endTime);
      if(h === null || h <= 0){ errEl.textContent = 'שעת הסיום חייבת להיות אחרי שעת ההתחלה'; submitBtn.disabled=false; submitBtn.textContent='🔴 סיום יום עבודה'; return; }
      // auto-close a dangling open break at clock-out time, just in case
      if(entry.breaks && entry.breaks.length && !entry.breaks[entry.breaks.length-1].end){
        entry.breaks[entry.breaks.length-1].end = endTime;
      }
      entry.end = endTime;
      const ok = await saveHours(emp.id, fresh);
      if(ok !== true){ errEl.textContent = 'שגיאה בשמירה: ' + ok; submitBtn.disabled=false; submitBtn.textContent='🔴 סיום יום עבודה'; return; }
      renderEmployeeDashboard(emp);
    };
  }

  // ---- excel import ----
  const excelFileInput = document.getElementById('excelFileInput');
  const excelErr = document.getElementById('excelErr');
  const excelPreviewArea = document.getElementById('excelPreviewArea');
  if(excelFileInput){
    excelFileInput.onchange = async () => {
      const file = excelFileInput.files[0];
      excelErr.textContent = '';
      excelPreviewArea.innerHTML = '';
      if(!file) return;
      excelPreviewArea.innerHTML = '<p class="hint">קורא את הקובץ...</p>';
      let parsed;
      try{
        parsed = await parseExcelFile(file);
      }catch(err){
        console.error('excel parse error', err);
        excelPreviewArea.innerHTML = '';
        excelErr.textContent = 'לא ניתן לקרוא את הקובץ — ודאו שזהו קובץ אקסל תקין (.xlsx)';
        return;
      }
      if(parsed.error){
        excelPreviewArea.innerHTML = '';
        excelErr.textContent = parsed.error;
        return;
      }
      const validRows = parsed.rows.filter(r => !r.error);
      const invalidRows = parsed.rows.filter(r => r.error);
      if(parsed.rows.length === 0){
        excelPreviewArea.innerHTML = '<p class="hint">לא נמצאו שורות נתונים בקובץ.</p>';
        return;
      }
      excelPreviewArea.innerHTML = `
        <p class="hint" style="margin-top:14px;">
          נמצאו <b style="color:#2F5233;">${validRows.length} רישומים תקינים</b>
          ${invalidRows.length ? ` ו-<b style="color:var(--danger);">${invalidRows.length} שורות עם שגיאה</b>` : ''}.
        </p>
        <div class="table-scroll" style="max-height:260px; overflow-y:auto;">
          <table>
            <thead><tr><th>שורה</th><th>תאריך</th><th>משעה</th><th>עד שעה</th><th>סה"כ שעות</th></tr></thead>
            <tbody>
              ${parsed.rows.map(r => `
                <tr style="${r.error ? 'color:var(--danger);' : ''}">
                  <td>${r.rowNum}</td>
                  <td class="mono">${r.date || '—'}</td>
                  <td class="mono">${r.start || '—'}</td>
                  <td class="mono">${r.end || '—'}</td>
                  <td class="mono">${r.error ? r.error : fmtHours(r.hours)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="actions" style="justify-content:flex-start; margin-top:14px;">
          <button type="button" class="btn brass" id="confirmExcelImport" ${validRows.length === 0 ? 'disabled' : ''}>ייבוא ${validRows.length} רישומים</button>
        </div>
      `;
      const confirmBtn = document.getElementById('confirmExcelImport');
      if(confirmBtn){
        confirmBtn.onclick = async () => {
          confirmBtn.disabled = true;
          confirmBtn.textContent = 'מייבא...';
          const fresh = await loadHours(emp.id);
          for(const r of validRows){
            const m = r.date.slice(0,7);
            if(!fresh[m]) fresh[m] = [];
            fresh[m].push({ id: uid(), date: r.date, start: r.start, end: r.end, breaks: [] });
          }
          const ok = await saveHours(emp.id, fresh);
          if(ok !== true){
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'ייבוא ' + validRows.length + ' רישומים';
            excelErr.textContent = 'שגיאה בשמירה: ' + ok;
            return;
          }
          const lastMonth = validRows[validRows.length - 1].date.slice(0,7);
          state._empMonth = lastMonth;
          renderEmployeeDashboard(emp);
        };
      }
    };
  }


  const excelToggleHeader = document.getElementById('excelToggleHeader');
  if(excelToggleHeader){
    excelToggleHeader.onclick = () => { state._excelOpen = !state._excelOpen; renderEmployeeDashboard(emp, null, true); };
  }
  const manualToggleHeader = document.getElementById('manualToggleHeader');
  if(manualToggleHeader && !editingEntry){
    manualToggleHeader.onclick = () => { state._manualOpen = !state._manualOpen; renderEmployeeDashboard(emp, null, true); };
  }

  const dateInput = document.getElementById('hoursDate');
  const startInput = document.getElementById('hoursStart');
  const endInput = document.getElementById('hoursEnd');
  if(dateInput && startInput && endInput){
    const preview = document.getElementById('computedHoursPreview');
    function updatePreview(){
      const h = computeHoursFromRange(startInput.value, endInput.value);
      preview.textContent = h !== null ? ('סה"כ: ' + fmtHours(h) + ' שעות') : '';
    }
    startInput.oninput = updatePreview;
    endInput.oninput = updatePreview;
    updatePreview();
    dateInput.onchange = () => { startInput.focus(); if(startInput.showPicker){ try{ startInput.showPicker(); }catch(e){} } };

    const cancelBtn = document.getElementById('cancelEditHours');
    if(cancelBtn) cancelBtn.onclick = () => renderEmployeeDashboard(emp);

    document.getElementById('addHoursForm').onsubmit = async (e) => {
      e.preventDefault();
      const date = document.getElementById('hoursDate').value;
      const start = startInput.value;
      const end = endInput.value;
      const errEl = document.getElementById('addHoursErr');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const hoursVal = computeHoursFromRange(start, end);
      if(!date || hoursVal === null || hoursVal <= 0){ errEl.textContent = 'יש להזין תאריך, שעת התחלה ושעת סיום תקינים'; return; }
      if(hoursVal > 24){ errEl.textContent = 'טווח השעות ארוך מ-24 שעות, בדקו את השעות שהוזנו'; return; }
      const entryMonth = date.slice(0,7);
      errEl.style.color = '';
      errEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'שומר...';
      const fresh = await loadHours(emp.id);

      if(editingEntry){
        // remove the old entry from whichever month it was in (it may change if the date changed)
        const oldMonth = editingEntry.date.slice(0,7);
        if(fresh[oldMonth]) fresh[oldMonth] = fresh[oldMonth].filter(x => x.id !== editingEntry.id);
        if(!fresh[entryMonth]) fresh[entryMonth] = [];
        fresh[entryMonth].push({ id: editingEntry.id, date, start, end, breaks: editingEntry.breaks || [] });
      } else {
        if(!fresh[entryMonth]) fresh[entryMonth] = [];
        fresh[entryMonth].push({ id: uid(), date, start, end, breaks: [] });
      }

      const ok = await saveHours(emp.id, fresh);
      submitBtn.disabled = false;
      submitBtn.textContent = editingEntry ? 'עדכון שינויים' : 'הוספה';
      if(ok !== true){ errEl.textContent = 'שגיאה בשמירה: ' + ok; return; }
      if(entryMonth !== month){ state._empMonth = entryMonth; }
      renderEmployeeDashboard(emp);
    };
  }
  document.querySelectorAll('[data-edit-entry]').forEach(btn => {
    btn.onclick = () => renderEmployeeDashboard(emp, btn.dataset.editEntry);
  });
  document.querySelectorAll('[data-del-entry]').forEach(btn => {
    btn.onclick = async () => {
      const confirmed = await showConfirmModal('האם אתה בטוח שברצונך למחוק?');
      if(!confirmed) return;
      const fresh = await loadHours(emp.id);
      fresh[month] = (fresh[month] || []).filter(e => e.id !== btn.dataset.delEntry);
      await saveHours(emp.id, fresh);
      renderEmployeeDashboard(emp);
    };
  });
}

init();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed', err));
  });
}
</script>
</body>
</html>
